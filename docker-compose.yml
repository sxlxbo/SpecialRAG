# ── doc-rag: Document RAG with nanobot WebUI ───────────────────────────
#
# Quick start:
#   1. Copy .env.example to .env and fill in your API key
#   2. Index documents: docker compose run --rm index --pdf /data/mydoc.pdf
#   3. Start:         docker compose up -d
#   4. Open:          http://localhost:8765

services:
  # ── Gateway: nanobot WebUI + API ──────────────────────────────────────
  gateway:
    build: .
    image: doc-rag:latest
    container_name: doc-rag-gateway
    ports:
      - "${GATEWAY_PORT:-8765}:8765"
    env_file:
      - .env
    environment:
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=8765
      - DOC_WORKSPACE=/app/doc_workspace
    volumes:
      - doc_workspace:/app/doc_workspace
      - nanobot_config:/home/docrag/.nanobot
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8765/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Indexer: one-shot document indexing ──────────────────────────────
  index:
    build: .
    image: doc-rag:latest
    container_name: doc-rag-index
    profiles: ["index"]
    entrypoint: ["/app/.venv/bin/python", "-m", "doc_rag.cli", "index"]
    env_file:
      - .env
    environment:
      - DOC_WORKSPACE=/app/doc_workspace
    volumes:
      - doc_workspace:/app/doc_workspace
      # Mount host PDF directory so you can index files directly:
      - ${PDF_DIR:-./pdfs}:/data:ro

volumes:
  doc_workspace:
    driver: local
  nanobot_config:
    driver: local
